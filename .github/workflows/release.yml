name: Release

# Tag-triggered release scaffold. Building/publishing the HAR needs the
# HarmonyOS toolchain (hvigor) and OHPM credentials, which are not available on
# stock GitHub runners — those steps are left as documented placeholders.
# See docs/PUBLISHING.md.

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-gates:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run all gates
        run: npm run verify

  release-notes:
    name: Create GitHub release
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release from CHANGELOG
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

